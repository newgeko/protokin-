<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>PROTOKIN - Physique et Politique du Geste</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
   <meta name="description" content="Traité des opérations du réel et matrice isomorphique. PROTOKIN explore la physique, la philosophie et l'ontologie des processus.">

  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@300;400;700&family=Noto+Serif:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  
  <!-- KaTeX -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@latest/dist/katex.min.css"/>
  
  <!-- CSS Docsify -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <link rel="stylesheet" href="css.css">
 
  <style>
    :root {
      --theme-color: #2c3e50;
    }
    body {
      font-family: 'Noto Serif', serif;
    }
    .sidebar-nav b {
      font-family: 'Noto Sans', sans-serif;
    }
  </style>

 <!-- Favicons -->
  <link rel="icon" type="image/png" href="https://ton-site-protokin.com/assets/favicon.png">
  <link rel="apple-touch-icon" sizes="180x180" href="https://ton-site-protokin.com/assets/apple-touch-icon.png">

  <!-- Robots -->
  <meta name="robots" content="index, follow">

</head>
<body>
  <div id="app">Chargement de la Matrice Isomorphique...</div>

  <script>
    window.$docsify = {
      name: '<div style="font-family:Noto Sans; font-weight:700; letter-spacing:2px;">PROTOKIN</div>',
      repo: '',
      loadSidebar: true,
	  loadNavbar: true,
      autoHeader: true,
      subMaxLevel: 3,
      auto2top: true,
      homepage: 'index.md',
	  
	  // CONFIGURATION LATEX
	latex: {
		inlineMath: [['$', '$'], ['\\(', '\\)']], // Délimiteurs en ligne : $...$
		displayMath: [['$$', '$$'], ['\\[', '\\]']], // Délimiteurs bloc : $$...$$
	},
      
      // Plugin Recherche
      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: 'Rechercher un concept...',
        noData: 'Aucun résultat.',
        depth: 4
      },

      // Plugin Pagination
      pagination: {
        previousText: 'Phase Précédente',
        nextText: 'Phase Suivante',
        crossChapter: true,
      },

     plugins: [
      function (hook, vm) {
        hook.afterEach(function (html) {
          return html + `
            <hr/>
            <footer style="text-align:center; font-size:0.9em; padding:20px; color:#999;">
              <div>© 2026 PROTOKIN by Newgekko</div>
              <div>Ontologie Formelle</div>
            </footer>
          `;
        });
      }
    ]

    }
  </script>


  
<script src="https://cdn.jsdelivr.net/npm/katex@latest/dist/katex.min.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/docsify-footer-enhancement/dist/docsify-footer-enhancement.min.js"></script> 
  <script src="https://cdn.jsdelivr.net/npm/docsify-pagination/dist/docsify-pagination.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify/lib/plugins/zoom-image.min.js"></script>

</body>
</html>
